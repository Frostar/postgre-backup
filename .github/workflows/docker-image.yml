name: Docker Image CI

on:
  push:
    branches: [master]
    paths:
      - backup
      - entrypoint.sh
      - s3cfg
      - Dockerfile
      - LICENSE
      - .github/workflows/docker-image.yml
  pull_request:
    branches: [master]
    paths:
      - backup
      - entrypoint.sh
      - s3cfg
      - Dockerfile
      - LICENSE
      - .github/workflows/docker-image.yml

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version (push only)
        id: ver
        if: github.event_name == 'push'
        run: |
          git fetch --tags --quiet
          latest=$(git tag --list 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)
          if [ -z "$latest" ]; then
            new="0.1.0"
          else
            v="${latest#v}"
            new="${v%.*}.$((${v##*.}+1))"
          fi
          echo "Next version: ${latest:-<none>} -> v$new"
          {
            echo "full=$new"
            echo "minor=${new%.*}"
            echo "major=${new%%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tag list
        id: tags
        run: |
          img="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=$img" >> "$GITHUB_OUTPUT"
          {
            echo "list<<EOF"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "$img:latest"
              echo "$img:${{ steps.ver.outputs.full }}"
              echo "$img:${{ steps.ver.outputs.minor }}"
              echo "$img:${{ steps.ver.outputs.major }}"
            else
              echo "$img:pr-${{ github.event.pull_request.number }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Push git tag (only after image is published)
        if: github.event_name == 'push'
        run: |
          new_tag="v${{ steps.ver.outputs.full }}"
          git tag "$new_tag"
          git push origin "$new_tag"
          echo "Tagged $new_tag"

      - if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.image }}:latest
          format: sarif
          output: trivy-results.sarif

      - if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
