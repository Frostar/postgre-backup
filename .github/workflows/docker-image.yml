name: Docker Image CI

on:
  push:
    branches: [master]
    paths:
      - backup
      - entrypoint.sh
      - s3cfg
      - Dockerfile
      - LICENSE
      - .github/workflows/docker-image.yml
  pull_request:
    branches: [master]
    paths:
      - backup
      - entrypoint.sh
      - s3cfg
      - Dockerfile
      - LICENSE
      - .github/workflows/docker-image.yml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version (push only)
        id: ver
        if: github.event_name == 'push'
        run: |
          git fetch --tags --quiet
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          v="${latest#v}"
          new="${v%.*}.$((${v##*.}+1))"
          git tag "v$new" && git push origin "v$new"
          echo "Bumped $latest -> v$new"
          {
            echo "full=$new"
            echo "minor=${new%.*}"
            echo "major=${new%%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tag list
        id: tags
        run: |
          img="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            printf 'list=%s\n' \
              "$img:latest,$img:${{ steps.ver.outputs.full }},$img:${{ steps.ver.outputs.minor }},$img:${{ steps.ver.outputs.major }}" \
              >> "$GITHUB_OUTPUT"
          else
            printf 'list=%s\n' "$img:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/frostar/postgre-backup:latest
          format: sarif
          output: trivy-results.sarif

      - if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
